<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    div.flag {
      background-color: #ce1126;
      width: 900px;
      height: 600px;
      position: relative;
    }
    .flag > div {
      background-color: #002868;
      height: 50%;
      width: 900px;
      position: absolute;
      top: 25%;
    }

    .flag > div > div {
      background-color: #ffffff;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      position: absolute;
      top: 50px;
      left: 350px;
    }

    p {
      position: relative;
      text-align: center;
      margin: 0%;
      font-size: 80px;
    }

    .flag > p {
      color: #ffffff;
    }
    
  </style>
</head>

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
